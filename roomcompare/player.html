<!DOCTYPE html><html><head><meta charset="utf8"><title>detector replay</title>
<style>
body{font-family:monospace;background:#111;color:#eee;margin:0;padding:16px}
#grid{display:grid;gap:1px;margin:12px 0}
.cell{width:24px;height:24px;font-size:8px;display:flex;align-items:center;justify-content:center;color:#666}
.wall{background:#222;color:#333}.open{background:#3a3a3a}
.door{background:#d8a01f;color:#000}
.room{background:#1d9e75;color:#000}
.room2{background:#2a8fd8;color:#000}
.hub{background:#9a5fc0;color:#fff}
.corridor{background:#5a4a1a}
.outside{background:#444;color:#888}
button{font-size:14px;padding:6px 14px;margin:4px;background:#333;color:#eee;border:1px solid #666;cursor:pointer}
#status{font-size:15px;margin:8px 0;min-height:20px}
#load{margin:8px 0}
.lg{display:inline-block;margin-right:12px;font-size:12px}
.sw{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:3px}
</style></head><body>
<h2>Detector replay player</h2>
<div id="load">Load a trace JSON: <input type="file" id="file" accept=".json"></div>
<div>
<span class="lg"><span class="sw" style="background:#d8a01f"></span>door</span>
<span class="lg"><span class="sw" style="background:#1d9e75"></span>single-door room</span>
<span class="lg"><span class="sw" style="background:#2a8fd8"></span>two-door room</span>
<span class="lg"><span class="sw" style="background:#9a5fc0"></span>hub</span>
<span class="lg"><span class="sw" style="background:#5a4a1a"></span>corridor</span>
<span class="lg"><span class="sw" style="background:#444"></span>outside</span>
</div>
<div id="status">load a *_trace.json file generated by ./trace</div>
<button onclick="step()">STEP ▶</button>
<button onclick="play()">PLAY ▶▶</button>
<button onclick="reset()">RESET</button>
<div id="grid"></div>
<script>
let data=null,si=0,cellEl={},H,W,timer=null;
document.getElementById('file').addEventListener('change',e=>{
 let f=e.target.files[0];if(!f)return;let rd=new FileReader();
 rd.onload=()=>{data=JSON.parse(rd.result);H=data.H;W=data.W;build();si=0;
  document.getElementById('status').innerText=`loaded: ${data.steps.length} steps. click STEP.`;};
 rd.readAsText(f);});
function build(){let g=document.getElementById('grid');g.innerHTML='';cellEl={};
 g.style.gridTemplateColumns=`repeat(${W},25px)`;
 for(let r=0;r<H;r++)for(let c=0;c<W;c++){let d=document.createElement('div');
  let open=data.grid[r][c]=='.';
  d.className='cell '+(open?'open':'wall');d.textContent=open?(r+","+c):"";
  cellEl[r*W+c]=d;g.appendChild(d);}}
function step(){
 if(!data){document.getElementById('status').innerText="load a file first";return;}
 if(si>=data.steps.length){document.getElementById('status').innerText="DONE.";return;}
 let s=data.steps[si];
 // doors persist; classify steps paint their region
 if(s.phase=='doors'){ s.cells.forEach(([r,c])=>cellEl[r*W+c].className='cell door'); }
 else { s.cells.forEach(([r,c])=>{ if(!cellEl[r*W+c].className.includes('door')) cellEl[r*W+c].className='cell '+s.color; }); }
 document.getElementById('status').innerText=`[${si+1}/${data.steps.length}] ${s.msg}`;
 si++;
}
function play(){if(timer){clearInterval(timer);timer=null;return;}
 timer=setInterval(()=>{if(!data||si>=data.steps.length){clearInterval(timer);timer=null;}else step();},500);}
function reset(){if(data){build();si=0;document.getElementById('status').innerText="reset. click STEP.";}}
</script></body></html>
